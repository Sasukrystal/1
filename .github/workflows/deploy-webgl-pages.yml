name: Deploy WebGL to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-webgl-pages.yml'
      - 'WebGLDeploy/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble WebGL site
        run: |
          set -e
          mkdir -p _site/Build
          cp -r WebGLDeploy/. _site/
          BASE="https://github.com/Sasukrystal/1/releases/download/webgl-v1.0"
          curl -fsSL -o _site/Build/WebGL.data.unityweb "$BASE/WebGL.data.unityweb"
          curl -fsSL -o _site/Build/WebGL.framework.js.unityweb "$BASE/WebGL.framework.js.unityweb"
          curl -fsSL -o _site/Build/WebGL.wasm.unityweb "$BASE/WebGL.wasm.unityweb"
          ls -lh _site/Build/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
