name: Deploy WebGL to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-webgl-pages.yml'
      - 'WebGLDeploy/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble WebGL site (same-origin Build/)
        run: |
          set -e
          mkdir -p _site/Build
          cp -r WebGLDeploy/. _site/
          MEDIA="https://media.githubusercontent.com/media/Sasukrystal/1/webgl-cdn/Build"
          for f in WebGL.loader.js WebGL.data.unityweb WebGL.framework.js.unityweb WebGL.wasm.unityweb; do
            echo "Downloading $f ..."
            curl -fsSL --retry 3 --retry-delay 5 -o "_site/Build/$f" "$MEDIA/$f"
          done
          ls -lh _site/Build/
          test "$(stat -c%s _site/Build/WebGL.data.unityweb)" -gt 100000000

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
