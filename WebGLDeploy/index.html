<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="/1/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | 黑暗地牢</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <button type="button" id="unity-fullscreen-button" aria-label="全屏" title="全屏"></button>
        <div id="unity-build-title">黑暗地牢</div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      function clearUnityCache() {
        if (!window.indexedDB || !indexedDB.databases) return Promise.resolve();
        return indexedDB.databases().then(function(dbs) {
          return Promise.all(dbs.map(function(db) {
            if (!db.name) return Promise.resolve();
            if (db.name.indexOf('Unity') >= 0 || db.name.indexOf('EMFS') >= 0 || db.name.indexOf('idbfs') >= 0) {
              return new Promise(function(resolve) {
                var req = indexedDB.deleteDatabase(db.name);
                req.onsuccess = req.onerror = req.onblocked = function() { resolve(); };
              });
            }
            return Promise.resolve();
          }));
        }).catch(function() {});
      }

      function fetchAsBlobUrl(url, onProgress) {
        return fetch(url, { cache: 'no-store' }).then(function(response) {
          if (!response.ok) throw new Error('Download failed (' + response.status + '): ' + url);
          var total = Number(response.headers.get('Content-Length') || 0);
          if (!response.body || !response.body.getReader) {
            return response.arrayBuffer().then(function(buf) {
              if (onProgress) onProgress(1);
              return URL.createObjectURL(new Blob([buf]));
            });
          }
          var reader = response.body.getReader();
          var chunks = [];
          var received = 0;
          function pump() {
            return reader.read().then(function(result) {
              if (result.done) {
                if (onProgress) onProgress(1);
                return URL.createObjectURL(new Blob(chunks));
              }
              chunks.push(result.value);
              received += result.value.length;
              if (onProgress && total > 0) onProgress(received / total);
              return pump();
            });
          }
          return pump();
        });
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var dataRemote = "https://media.githubusercontent.com/media/Sasukrystal/1/webgl-cdn/Build/WebGL.data.unityweb?v=5";
      var config = {
        dataUrl: "",
        frameworkUrl: buildUrl + "/WebGL.framework.js.unityweb",
        codeUrl: buildUrl + "/WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DarkDungeon Team",
        productName: "黑暗地牢",
        productVersion: "0.1.1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "1280px";
        canvas.style.height = "720px";
      }

      loadingBar.style.display = "block";

      clearUnityCache().then(function() {
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function() {
          fetchAsBlobUrl(dataRemote, function(downloadProgress) {
            progressBarFull.style.width = (downloadProgress * 70) + "%";
          }).then(function(blobUrl) {
            config.dataUrl = blobUrl;
            return createUnityInstance(canvas, config, function(progress) {
              progressBarFull.style.width = (70 + progress * 30) + "%";
            });
          }).then(function(unityInstance) {
            loadingBar.style.display = "none";
            fullscreenButton.onclick = function() { unityInstance.SetFullscreen(1); };
          }).catch(function(message) {
            alert(message);
          });
        };
        script.onerror = function() {
          alert("Failed to load WebGL.loader.js");
        };
        document.body.appendChild(script);
      });
    </script>
  </body>
</html>
